# https://docs.railway.com/reference/config-as-code
# Default: single Docker image (API + built SPA). For split API + static frontend,
# use two Railway services — see RAILWAY.md (API: Railpack + root; frontend: frontend/).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
