services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: course-copilot-api
    runtime: python
    buildCommand: "apt-get install -y poppler-utils && pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # fill in manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend (React static site) ──────────────────────────────────
  - type: web
    name: course-copilot-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # fill in manually after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
